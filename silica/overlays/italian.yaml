noise_patterns:
  # Italian structural headings
  - '^(Capitolo|Lezione|Esercizio)\b[:\s]'
  - '^(Riassunto|Argomenti|Riferimenti|Obiettivi|Prerequisiti|Calendario)\s*$'
  - '^Materiale\b'
  # Continued-slide markers (Italian)
  - '\((continua|segue)\)\s*$'
  - '^(continua|segue)\b'
  # Italian "What is" variant
  - "^Cos'?\xE8\\b"
