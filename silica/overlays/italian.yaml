# Italian academic domain overlay (bundled). Selected automatically by
# overlay_for_lang("italian"); also installable as <vault>/overlay.yaml.
#
# Italian function words, course-metadata structural headings, and
# Italian-specific noise patterns. Filename = Snowball language name.

extends_default: true

