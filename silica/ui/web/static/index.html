<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>silica</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div id="drop-hint">[ DROP TO NUCLEATE &rarr; INBOX/ ]</div>

  <header>
    <button id="sidebar-toggle" class="ghost" title="toggle sidebar">&#9776;</button>
    <div class="brand">SILICA</div>
    <nav class="tabs">
      <button class="tab active" data-tab="chat">chat</button>
      <button class="tab" data-tab="graph">graph</button>
      <button class="tab" data-tab="map">map</button>
    </nav>
    <div class="spacer"></div>
    <button id="note-last" class="ghost" hidden title="reopen last note"></button>
    <div class="ctx-tokens" id="ctx-tokens" title="context window usage"></div>
    <button id="new-chat" class="ghost">+ new chat</button>
    <button id="stop" class="ghost" hidden>&#9632; stop</button>
  </header>

  <main>
    <aside id="sidebar">
      <div class="side-section">
        <div class="side-title">Vault</div>
        <div class="vault" id="vault">&mdash;</div>
        <div class="stat-grid">
          <div class="stat"><div class="val" id="stat-notes">&mdash;</div><div class="lbl">Notes</div></div>
          <div class="stat"><div class="val" id="stat-links">&mdash;</div><div class="lbl">Links</div></div>
          <div class="stat"><div class="val" id="stat-clusters">&mdash;</div><div class="lbl">Clusters</div></div>
          <div class="stat"><div class="val warn" id="stat-unresolved">&mdash;</div><div class="lbl">Unresolved</div></div>
        </div>
      </div>

      <div class="side-section">
        <input id="side-search" type="text" placeholder="search notes + chats&hellip;" autocomplete="off" />
      </div>

      <details class="side-section" id="side-files" open>
        <summary class="side-title">Files<button id="tree-toggle" type="button" title="expand/collapse all folders"></button></summary>
        <div id="tree"></div>
      </details>

      <details class="side-section" id="side-history" open>
        <summary class="side-title">History</summary>
        <div id="sessions"></div>
        <button id="sessions-more" class="linklike" hidden></button>
      </details>
    </aside>

    <section id="view-chat" class="view active">
      <div id="log" data-caption="vault ready · type below, or drop a file to nucleate" data-intro="
              ▒▒▒                ░░                   ░░░░

           ▒▒▒▒▒▒▓▓▒▒░░░░░░░░░░▒▒▒▒░▒▒▒▒▒▒▒░░ ░▒▓▒▒▒▓▓▓▓▓▒

                              ░░░░   ░░░
                                    ░▒▒░"></div>
      <div class="commands" id="commands">
        <button data-cmd="/report">/report</button>
        <button data-cmd="/organize">/organize</button>
        <button data-cmd="/cooccur">/cooccur</button>
        <button data-cmd="/embed">/embed</button>
        <button data-cmd="/find">/find</button>
      </div>
      <div id="attachments" hidden></div>
      <form id="composer">
        <input id="nucleate-file" type="file" multiple hidden />
        <button type="button" id="attach" title="attach files (pdf, code, notes…)">+</button>
        <textarea id="input" rows="1" placeholder="message silica…  (⏎ send, ⇧⏎ newline)"></textarea>
        <button type="submit" id="send">send</button>
      </form>
    </section>

    <section id="view-graph" class="view">
      <div id="graph-loading" class="frame-loading" hidden>
        <div class="spinner"></div>
        <div>[ BUILDING GRAPH&hellip; LARGE VAULTS TAKE A MOMENT ]</div>
      </div>
      <iframe id="graph-frame" title="vault graph"></iframe>
    </section>

    <section id="view-map" class="view">
      <form id="map-bar">
        <input id="map-note" type="text" placeholder="note to map — type a name, or pick one from FILES in the sidebar…" autocomplete="off" />
        <button type="submit">map</button>
      </form>
      <div id="map-loading" class="frame-loading" hidden>
        <div class="spinner"></div>
        <div>[ BUILDING MAP&hellip; ]</div>
      </div>
      <iframe id="map-frame" title="radial map"></iframe>
    </section>
  </main>

  <aside id="note-panel" aria-hidden="true">
    <div id="note-resize" title="drag to resize"></div>
    <header>
      <span id="note-title"></span>
      <button id="note-summarize" class="ghost" title="summarize this note in chat">summarize</button>
      <button id="note-explain" class="ghost" title="explain this note's topic, grounded in the vault">explain</button>
      <button id="note-quiz" class="ghost" title="quiz yourself on this note">quiz</button>
      <button id="note-relate" class="ghost" title="map how this note relates to its neighbors">relate</button>
      <button id="note-map" class="ghost" title="open in map view">map</button>
      <button id="note-close" class="ghost" title="close">&#10005;</button>
    </header>
    <details id="note-mini-map">
      <summary>map preview</summary>
      <iframe id="note-mini-map-frame" title="note map preview"></iframe>
    </details>
    <div id="note-body"></div>
  </aside>

  <div id="dock" hidden>
    <div id="peek" hidden>
      <header>
        <span id="peek-title"></span>
        <button id="peek-open-chat" class="ghost" title="continue in chat — full transcript">open in chat</button>
        <button id="peek-close" class="ghost" title="dismiss">&#10005;</button>
      </header>
      <div id="peek-body"></div>
    </div>
    <form id="dock-composer">
      <textarea id="dock-input" rows="1" placeholder="ask the vault from here…  (⏎ send, ⇧⏎ newline)"></textarea>
      <button type="submit" id="dock-send">send</button>
    </form>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
